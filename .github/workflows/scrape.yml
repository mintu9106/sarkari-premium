name: Sarkari Premium Job Scraper Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'jobs_db.json'
  schedule:
    - cron: '*/30 * * * *' # Runs automatically every 30 minutes
  workflow_dispatch: # Allows manual click trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Environment Variables
        run: |
          echo "Checking if secrets are configured on GitHub..."
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then echo "  - GEMINI_API_KEY: SET"; else echo "  - GEMINI_API_KEY: EMPTY"; fi
          if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then echo "  - DEEPSEEK_API_KEY: SET"; else echo "  - DEEPSEEK_API_KEY: EMPTY"; fi
          if [ -n "${{ secrets.GROQ_API_KEY }}" ]; then echo "  - GROQ_API_KEY: SET"; else echo "  - GROQ_API_KEY: EMPTY"; fi


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          if [ -f scraper/requirements.txt ]; then pip install -r scraper/requirements.txt; fi

      - name: Run Scraper Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scraper/scraper.py

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs_db.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: sync scraped jobs in database"
            git push origin main
          else
            echo "No changes in jobs_db.json to commit."
          fi
